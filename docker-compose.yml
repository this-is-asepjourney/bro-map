# =============================================================================
# docker-compose.yml — satu file untuk lokal, VPS, Dokploy (Traefik).
#
# • db hanya di jaringan internal proyek (tidak ke dokploy-network).
# • backend & frontend: expose + dokploy-network agar Traefik Dokploy bisa route.
# • Akses publik: domain di panel Dokploy → frontend port 8501, backend 8000.
# • GEODATA_BIND (opsional): default ./data; di Dokploy bisa ../files/... (lihat docs Dokploy).
#
# Lokal tanpa jaringan dokploy-network: sekali jalankan
#   docker network create dokploy-network
# (nama jaringan sama dengan yang dipakai instalasi Dokploy di server.)
#
# Lokal: docker compose up --build  (override menambah ports & reload)
# Server: docker compose up -d --build
# =============================================================================

services:
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geofinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-geofinder}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geofinder} -d ${POSTGRES_DB:-geofinder}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-geofinder}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-geofinder}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ${GEODATA_BIND:-./data}:/app/data:ro
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://backend:8000/api}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8501"
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 35s

volumes:
  pgdata:

networks:
  dokploy-network:
    external: true
