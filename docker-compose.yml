# =============================================================================
# docker-compose.yml — production-ready (Coolify, VPS, Dokploy).
#
# • DB tidak di-publish ke host (hanya jaringan internal compose).
# • Backend & frontend memakai `expose` → reverse proxy (Traefik) mengakses
#   port internal; HTTPS / domain diurus panel hosting.
#
# --- Dokploy (akses publik lewat domain) ---
# 1) Sertakan overlay jaringan Traefik:
#      docker compose -f docker-compose.yml -f docker-compose.dokploy.yml up -d --build
#    Di UI Dokploy (Advanced / custom compose command), tambahkan flag di atas
#    jika field-nya mendukung; jika hanya satu file, salin isi
#    `docker-compose.dokploy.yml` ke bawah file ini (networks + networks per service).
# 2) Tab Domains → tambah domain untuk service `frontend` (port 8501) dan, jika
#    perlu API publik, untuk `backend` (port 8000). Dokploy menambahkan label Traefik.
# 3) Variabel lingkungan: isi seperti `.env`. Untuk data GeoJSON di luar direktori
#    clone (disarankan Dokploy agar mount tidak ikut terhapus saat redeploy), set:
#      GEODATA_BIND=../files/bro-map-geo
#    lalu unggah/isikan file di path tersebut di server (lihat docs Dokploy → files).
#
# --- Lokal ---
# `docker-compose.override.yml` menambah ports (8010, 8501, 5433) dan hot-reload.
#
# Pemakaian:
#   Local dev     : docker compose up --build
#   Production    : docker compose -f docker-compose.yml up -d --build
#   Production + Dokploy: lihat langkah (1) di atas
# =============================================================================

services:
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geofinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-geofinder}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geofinder} -d ${POSTGRES_DB:-geofinder}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-geofinder}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-geofinder}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ${GEODATA_BIND:-./data}:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://backend:8000/api}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 35s

volumes:
  pgdata:
